<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>New Recipe - Allergen System 🌸</title>
  <link rel="stylesheet" type="text/css" href="/css/mainmenu.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>➕ Create New Recipe</h1>
  </div>

  <div class="form-wrapper">
    <form action="#" th:action="@{/newRecipe}" th:object="${recipe}" method="post">
      <p><label for="foodId">🍱 Select Food:</label></p>
      <p>
        <select id="foodId" name="foodId" required>
          <option value="">Choose a food...</option>
          <option th:each="food : ${foods}"
                  th:value="${food.id}"
                  th:text="${food.name}">
          </option>
        </select>
      </p>

      <p><label for="ingredientId">🥬 Select Ingredient:</label></p>
      <p>
        <select id="ingredientId" name="ingredientId" required>
          <option value="">Choose an ingredient...</option>
          <option th:each="ingredient : ${ingredients}"
                  th:value="${ingredient.id}"
                  th:text="${ingredient.name}">
          </option>
        </select>
      </p>

      <p><input type="submit" value="✅ Create Recipe" /></p>
    </form>
  </div>

  <div class="nav-links">
    <form action="#" th:action="@{/allRecipes}" method="get">
      <input type="submit" value="🔙 Back to Recipes" />
    </form>
    <form action="#" th:action="@{/home}" method="get">
      <input type="submit" value="🏠 Home" />
    </form>
  </div>
</div>
</body>
</html>
