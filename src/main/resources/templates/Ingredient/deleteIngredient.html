<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Delete Ingredient - Allergen System 🌸</title>
  <link rel="stylesheet" type="text/css" href="/css/mainmenu.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>🗑️ Delete Ingredient</h1>
    <p style="color: #D6A1B0; font-size: 16px; margin-top: 10px;">
      Are you sure you want to delete this ingredient?
    </p>
  </div>

  <table>
    <thead>
      <tr>
        <th>🆔 ID</th>
        <th>📛 Name</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td th:text = "${ingredient.id}"></td>
        <td th:text = "${ingredient.name}"></td>
      </tr>
    </tbody>
  </table>

  <div class="nav-links">
    <form action="#" th:action="@{/allIngredients}" method="get">
      <input type="submit" value="❌ Cancel" />
    </form>
    <!--HTML Does not recognize Put or Delete, so you have to do it via post and the name="_method" value = "post/delete"-->
    <form th:action="@{/deleteIngredient}" method="post">
      <input type="hidden" name="_method" value="delete" />
      <input type="hidden" name="ingredientId" th:value="${ingredient.id}" />
      <input type="submit" value="✅ Confirm Delete" />
    </form>
  </div>
</div>
</body>
</html>
