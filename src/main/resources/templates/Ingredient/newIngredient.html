<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>New Ingredient - Allergen System 🌸</title>
  <link rel="stylesheet" type="text/css" href="/css/mainmenu.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>➕ Add New Ingredient</h1>
  </div>

  <div class="form-wrapper">
    <form action="#" th:action="@{/newIngredient}" th:object="${ingredient}" method="post">
      <p><label for="name">Ingredient Name:</label></p>
      <p><input type="text" id="name" th:field="*{name}" placeholder="Enter ingredient name" required /></p>
      <p><input type="submit" value="✅ Submit" /></p>
    </form>
  </div>

  <div class="nav-links">
    <form action="#" th:action="@{/allIngredients}" method="get">
      <input type="submit" value="🔙 Back to Ingredients" />
    </form>
    <form action="#" th:action="@{/home}" method="get">
      <input type="submit" value="🏠 Home" />
    </form>
  </div>
</div>
</body>
</html>
