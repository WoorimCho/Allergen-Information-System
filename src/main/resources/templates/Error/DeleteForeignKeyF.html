<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Allergen System 🌸</title>
    <link rel="stylesheet" type="text/css" href="/css/mainmenu.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .error-box {
            background: #FFE5EC;
            border: 3px solid #E889A7;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>⚠️ Cannot Delete Food</h1>
    </div>

    <div class="error-box">
        <div class="error-icon">🚫</div>
        <h2 style="color: #E889A7; margin-bottom: 20px;">Deletion Failed!</h2>
        <p style="font-size: 18px; color: #5D4954;">
            You have attempted to delete a <strong>Food</strong> that has recipes associated with it.
        </p>
        <p style="font-size: 18px; color: #5D4954; margin-top: 15px;">
            Please delete all related recipes before attempting to delete this food item.
        </p>
    </div>

    <div class="nav-links">
        <form action="#" th:action="@{/allFood}" method="get">
            <input type="submit" value="🔙 Back to Foods" />
        </form>
        <form action="#" th:action="@{/home}" method="get">
            <input type="submit" value="🏠 Home" />
        </form>
    </div>
</div>
</body>
</html>
