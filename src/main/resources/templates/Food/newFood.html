<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Food - Allergen System 🌸</title>
    <link rel="stylesheet" type="text/css" href="/css/mainmenu.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>➕ Add New Food</h1>
    </div>

    <div class="form-wrapper">
        <form action="#" th:action="@{/newFood}" th:object="${food}" method="post">
            <p><label for="name">Food Name:</label></p>
            <p><input type="text" id="name" th:field="*{name}" placeholder="Enter food name" required /></p>
            <p><input type="submit" value="✅ Submit" /></p>
        </form>
    </div>

    <div class="nav-links">
        <form action="#" th:action="@{/allFood}" method="get">
            <input type="submit" value="🔙 Back to Foods" />
        </form>
        <form action="#" th:action="@{/home}" method="get">
            <input type="submit" value="🏠 Home" />
        </form>
    </div>
</div>
</body>
</html>
