<!--This file iterates through all the currently stored food items and displays them-->

<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>All Foods - Allergen System 🌸</title>
    <link rel="stylesheet" type="text/css" href="/css/mainmenu.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>🍱 Food Items</h1>
    </div>

    <table>
        <thead>
            <tr>
                <th>🆔 Id</th>
                <th>📛 Name</th>
                <th>🗑️ Delete</th>
                <th>✏️ Edit</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each = "food : ${foods}">
                <td th:text = "${food.id}"></td>
                <td th:text = "${food.name}"></td>
                <td>
                    <form action="#" th:action="@{/deleteFood}" method="get">
                        <input type = "hidden" name ="foodId" th:value="${food.id}">
                        <input type="submit" value="Delete" />
                    </form>
                </td>
                <td>
                    <form action="#" th:action="@{/modifyFood}" method="get">
                        <input type = "hidden" name ="foodId" th:value="${food.id}">
                        <input type="submit" value="Edit" />
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="nav-links">
        <form action="#" th:action="@{/newFood}" method="get">
            <input type="submit" value="➕ New Food" />
        </form>
        <form action="#" th:action="@{/home}" method="get">
            <input type="submit" value="🏠 Home" />
        </form>
    </div>
</div>
</body>
</html>
